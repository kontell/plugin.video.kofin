[mypy]
python_version = 3.10
mypy_path = lib
files = lib, default.py, service.py, context_play.py
disallow_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
strict_equality = True

# Kodistubs has full annotations but no py.typed marker; analyze it anyway.
[mypy-xbmc,xbmcaddon,xbmcgui,xbmcplugin,xbmcvfs]
follow_untyped_imports = True

[mypy-websocket.*]
ignore_missing_imports = True
