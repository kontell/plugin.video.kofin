[mypy]
python_version = 3.10
mypy_path = lib
files = lib, default.py, service.py, context_play.py
disallow_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
strict_equality = True

# The sync transplant is ported fork code (docs/phase2-implementation-plan.md
# §2): mypy runs relaxed over it and tightens opportunistically later.
# Rewriting proven writer SQL to satisfy a linter is how transplants die.
[mypy-kofin.sync.*]
disallow_untyped_defs = False
check_untyped_defs = False

# New phase-5 code is not transplant: the change-feed providers and
# planners are strict (docs/phase5-implementation-plan.md §2).
[mypy-kofin.sync.changefeed]
disallow_untyped_defs = True
check_untyped_defs = True

# The SyncPlay transplant gets the same treatment (phase 4, plan §2).
[mypy-kofin.syncplay.*]
disallow_untyped_defs = False
check_untyped_defs = False

# Kodistubs has full annotations but no py.typed marker; analyze it anyway.
[mypy-xbmc,xbmcaddon,xbmcgui,xbmcplugin,xbmcvfs]
follow_untyped_imports = True

[mypy-websocket.*]
ignore_missing_imports = True
